<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Read the Bible — Still Waters</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: linear-gradient(180deg,#c8e8f8 0%,#ddf0fa 40%,#f5faff 100%);
    --panel: rgba(255,255,255,0.9);
    --text: #1a2a3a;
    --muted: #2a4a6a;
    --blue: #5A9CBB;
    --border: rgba(100,160,220,0.25);
  }
  body.dark {
    --bg: linear-gradient(180deg,#071218 0%,#0a1a24 60%,#0f2236 100%);
    --panel: rgba(12,24,38,0.95);
    --text: #d8ecf8;
    --muted: #7ab0cc;
    --border: rgba(122,171,204,0.18);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    font-family: 'EB Garamond', Georgia, serif;
    color: var(--text); min-height:100vh;
    transition: background 0.4s, color 0.3s;
  }

  /* ── NAV ── */
  .nav {
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 28px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border);
    position: sticky; top:0; z-index:50;
  }
  body.dark .nav { background: rgba(7,18,24,0.85); }
  .nav-logo {
    font-family:'Cinzel',serif;
    font-size:18px; font-weight:700; color:var(--blue);
    text-decoration:none;
  }
  .nav-logo span { color:var(--text); }
  .nav-right { display:flex; align-items:center; gap:14px; }
  .nav-home {
    font-family:'Cinzel',serif; font-size:10px; font-weight:600;
    letter-spacing:2px; text-transform:uppercase;
    color:var(--muted); text-decoration:none; transition:color 0.15s;
  }
  .nav-home:hover { color:var(--blue); }
  .dark-btn {
    background:rgba(255,255,255,0.15); border:1px solid var(--border);
    border-radius:20px; padding:5px 12px; cursor:pointer; font-size:15px;
  }

  /* ── LAYOUT ── */
  .reader-wrap {
    display: grid;
    grid-template-columns: 220px 1fr;
    min-height: calc(100vh - 57px);
  }
  @media(max-width:700px) { .reader-wrap { grid-template-columns: 1fr; } }

  /* ── SIDEBAR ── */
  .sidebar {
    background: var(--panel);
    border-right: 1px solid var(--border);
    padding: 16px 0;
    overflow-y: auto;
    position: sticky; top:57px;
    max-height: calc(100vh - 57px);
  }
  .sidebar-section {
    font-family:'Cinzel',serif; font-size:9px; font-weight:700;
    letter-spacing:3px; text-transform:uppercase;
    color:var(--blue); padding:10px 18px 6px;
  }
  .book-btn {
    display:block; width:100%;
    padding:8px 18px;
    font-family:'EB Garamond',serif; font-size:15px;
    color:var(--muted); background:none; border:none;
    text-align:left; cursor:pointer; transition:all 0.15s;
    border-left:3px solid transparent;
  }
  .book-btn:hover { color:var(--blue); background:rgba(90,156,187,0.07); }
  .book-btn.active {
    color:var(--blue); font-weight:600;
    border-left-color:var(--blue);
    background:rgba(90,156,187,0.1);
  }

  /* ── READING PANE ── */
  .reading-pane { padding:32px 40px 64px; max-width:780px; }
  @media(max-width:900px) { .reading-pane { padding:20px 18px 48px; } }

  /* Book / Chapter selector */
  .chapter-bar {
    display:flex; flex-wrap:wrap; gap:6px;
    margin-bottom:28px;
  }
  .ch-btn {
    font-family:'Cinzel',serif; font-size:10px; font-weight:600;
    padding:5px 11px; border-radius:6px;
    background:rgba(90,156,187,0.08); border:1px solid rgba(90,156,187,0.2);
    color:var(--muted); cursor:pointer; transition:all 0.15s;
  }
  .ch-btn:hover { background:rgba(90,156,187,0.18); color:var(--blue); }
  .ch-btn.active { background:var(--blue); color:#fff; border-color:var(--blue); }

  /* Book/chapter heading */
  .reading-heading {
    font-family:'Cinzel',serif;
    font-size:26px; font-weight:700; color:var(--blue);
    margin-bottom:24px; letter-spacing:2px; text-transform:uppercase;
  }

  /* Version selector strip */
  .version-strip {
    display:flex; flex-wrap:wrap; gap:7px; align-items:center;
    margin-bottom:22px;
  }
  .version-strip span {
    font-family:'Cinzel',serif; font-size:9px; font-weight:700;
    letter-spacing:2px; text-transform:uppercase; color:var(--muted);
    margin-right:4px;
  }
  .v-btn {
    font-family:'Cinzel',serif; font-size:10px; letter-spacing:1.5px;
    padding:4px 12px; border-radius:20px;
    border:1px solid rgba(90,156,187,0.3);
    background:transparent; color:var(--muted); cursor:pointer; transition:all 0.15s;
  }
  .v-btn.active { background:var(--blue); color:#fff; border-color:var(--blue); }

  /* Verse text */
  .verse-container { line-height:0; }
  .verse-line {
    display:inline;
    font-size:clamp(18px,2.2vw,22px);
    line-height:1.9; color:var(--text);
  }
  .verse-num {
    font-family:'Cinzel',serif;
    font-size:10px; font-weight:700;
    color:var(--blue); vertical-align:super;
    margin-right:4px; margin-left:8px;
    line-height:1;
  }
  .verse-line:first-child .verse-num { margin-left:0; }

  /* Loading / empty */
  .loading-txt {
    font-style:italic; color:var(--muted); font-size:16px;
    padding:32px 0; text-align:center;
  }

  /* Prev/Next nav */
  .ch-nav {
    display:flex; justify-content:space-between; align-items:center;
    margin-top:40px; padding-top:24px;
    border-top:1px solid var(--border);
  }
  .nav-ch-btn {
    font-family:'Cinzel',serif; font-size:11px; font-weight:600;
    letter-spacing:2px; text-transform:uppercase;
    color:var(--blue); background:none; border:1px solid rgba(90,156,187,0.3);
    border-radius:20px; padding:8px 20px; cursor:pointer; transition:all 0.15s;
  }
  .nav-ch-btn:hover { background:rgba(90,156,187,0.1); }
  .nav-ch-btn:disabled { opacity:0.25; cursor:default; }
  .ch-position {
    font-family:'Cinzel',serif; font-size:10px; letter-spacing:2px;
    text-transform:uppercase; color:var(--muted);
  }
</style>
</head>
<body>

<nav class="nav">
  <a href="/" class="nav-logo"><span>Still </span>Waters</a>
  <div class="nav-right">
    <a href="/" class="nav-home">← Home</a>
    <button class="dark-btn" onclick="toggleDark()" id="dark-btn">🌙</button>
  </div>
</nav>

<div class="reader-wrap">

  <!-- SIDEBAR: Book list -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-section">Old Testament</div>
    <!-- Books injected by JS -->
    <div id="ot-list"></div>
    <div class="sidebar-section" style="margin-top:10px;">New Testament</div>
    <div id="nt-list"></div>
  </div>

  <!-- READING PANE -->
  <div class="reading-pane">
    <div class="version-strip">
      <span>Version</span>
      <button class="v-btn active" data-v="kjv" onclick="setV('kjv',this)" title="King James Version — The classic 1611 English translation, known for its poetic, majestic language.">KJV</button>
      <button class="v-btn" data-v="web" onclick="setV('web',this)" title="World English Bible — A modern public domain translation in clear, contemporary English.">WEB</button>
    </div>

    <div id="reading-heading" class="reading-heading">Choose a book to begin</div>
    <div class="chapter-bar" id="chapter-bar"></div>
    <div id="verse-text" class="verse-container">
      <div class="loading-txt">
        Select a book from the sidebar to start reading.<br><br>
        <em>"Thy word is a lamp unto my feet, and a light unto my path." — Psalm 119:105</em>
      </div>
    </div>

    <div class="ch-nav" id="ch-nav" style="display:none;">
      <button class="nav-ch-btn" id="prev-btn" onclick="prevChapter()">← Previous</button>
      <span class="ch-position" id="ch-pos"></span>
      <button class="nav-ch-btn" id="next-btn" onclick="nextChapter()">Next →</button>
    </div>
  </div>

</div>

<script>
const OT = [
  "Genesis","Exodus","Leviticus","Numbers","Deuteronomy","Joshua","Judges","Ruth",
  "1 Samuel","2 Samuel","1 Kings","2 Kings","1 Chronicles","2 Chronicles","Ezra",
  "Nehemiah","Esther","Job","Psalms","Proverbs","Ecclesiastes","Song of Solomon",
  "Isaiah","Jeremiah","Lamentations","Ezekiel","Daniel","Hosea","Joel","Amos",
  "Obadiah","Jonah","Micah","Nahum","Habakkuk","Zephaniah","Haggai","Zechariah","Malachi"
];
const NT = [
  "Matthew","Mark","Luke","John","Acts","Romans","1 Corinthians","2 Corinthians",
  "Galatians","Ephesians","Philippians","Colossians","1 Thessalonians","2 Thessalonians",
  "1 Timothy","2 Timothy","Titus","Philemon","Hebrews","James","1 Peter","2 Peter",
  "1 John","2 John","3 John","Jude","Revelation"
];
const CHAPTERS = {
  Genesis:50,Exodus:40,Leviticus:27,Numbers:36,Deuteronomy:34,Joshua:24,Judges:21,Ruth:4,
  "1 Samuel":31,"2 Samuel":24,"1 Kings":22,"2 Kings":25,"1 Chronicles":29,"2 Chronicles":36,
  Ezra:10,Nehemiah:13,Esther:10,Job:42,Psalms:150,Proverbs:31,Ecclesiastes:12,
  "Song of Solomon":8,Isaiah:66,Jeremiah:52,Lamentations:5,Ezekiel:48,Daniel:12,
  Hosea:14,Joel:3,Amos:9,Obadiah:1,Jonah:4,Micah:7,Nahum:3,Habakkuk:3,
  Zephaniah:3,Haggai:2,Zechariah:14,Malachi:4,Matthew:28,Mark:16,Luke:24,John:21,
  Acts:28,Romans:16,"1 Corinthians":16,"2 Corinthians":13,Galatians:6,Ephesians:6,
  Philippians:4,Colossians:4,"1 Thessalonians":5,"2 Thessalonians":3,"1 Timothy":6,
  "2 Timothy":4,Titus:3,Philemon:1,Hebrews:13,James:5,"1 Peter":5,"2 Peter":3,
  "1 John":5,"2 John":1,"3 John":1,Jude:1,Revelation:22
};

let currentBook = null, currentChapter = 1, currentVersion = 'kjv';

// Build sidebar
function buildSidebar() {
  ['ot','nt'].forEach(which => {
    const books = which === 'ot' ? OT : NT;
    const el = document.getElementById(`${which}-list`);
    el.innerHTML = books.map(b =>
      `<button class="book-btn" onclick="selectBook('${b.replace(/'/g,"\\'")}',this)">${b}</button>`
    ).join('');
  });
}

function selectBook(book, btn) {
  document.querySelectorAll('.book-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentBook = book;
  currentChapter = 1;
  buildChapterBar(book);
  loadChapter(book, 1);
}

function buildChapterBar(book) {
  const total = CHAPTERS[book] || 1;
  const bar = document.getElementById('chapter-bar');
  bar.innerHTML = Array.from({length:total},(_,i)=>i+1).map(n =>
    `<button class="ch-btn${n===1?' active':''}" onclick="selectChapter(${n},this)">${n}</button>`
  ).join('');
}

function selectChapter(n, btn) {
  document.querySelectorAll('.ch-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentChapter = n;
  loadChapter(currentBook, n);
}

function setV(v, btn) {
  currentVersion = v;
  document.querySelectorAll('.v-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (currentBook) loadChapter(currentBook, currentChapter);
}

async function loadChapter(book, chapter) {
  const el   = document.getElementById('verse-text');
  const head = document.getElementById('reading-heading');
  const nav  = document.getElementById('ch-nav');
  const pos  = document.getElementById('ch-pos');

  el.innerHTML = '<div class="loading-txt">Loading…</div>';
  head.textContent = `${book} ${chapter}`;
  nav.style.display = 'flex';
  pos.textContent = `Chapter ${chapter} of ${CHAPTERS[book]}`;

  document.getElementById('prev-btn').disabled = chapter <= 1;
  document.getElementById('next-btn').disabled = chapter >= CHAPTERS[book];

  try {
    const enc = encodeURIComponent(book.replace(/ /g,'+'));
    const url = `https://bible-api.com/${enc}+${chapter}?translation=${currentVersion}`;
    const data = await fetch(url).then(r => r.json());
    const verses = data.verses || [];
    if (!verses.length) throw new Error('no verses');
    el.innerHTML = verses.map(v =>
      `<span class="verse-line"><sup class="verse-num">${v.verse}</sup>${v.text.trim()} </span>`
    ).join('');
  } catch(e) {
    el.innerHTML = `<div class="loading-txt">Could not load ${book} ${chapter}. Check your connection and try again.</div>`;
  }

  // Scroll to top of reading pane
  window.scrollTo({top:0, behavior:'smooth'});
}

function prevChapter() {
  if (currentChapter <= 1) return;
  currentChapter--;
  document.querySelectorAll('.ch-btn').forEach((b,i) => b.classList.toggle('active', i+1===currentChapter));
  loadChapter(currentBook, currentChapter);
}
function nextChapter() {
  if (currentChapter >= CHAPTERS[currentBook]) return;
  currentChapter++;
  document.querySelectorAll('.ch-btn').forEach((b,i) => b.classList.toggle('active', i+1===currentChapter));
  loadChapter(currentBook, currentChapter);
}

function toggleDark() {
  const dark = document.body.classList.toggle('dark');
  document.getElementById('dark-btn').textContent = dark ? '☀️' : '🌙';
  localStorage.setItem('sw-dark', dark ? '1' : '');
}
if (localStorage.getItem('sw-dark')) {
  document.body.classList.add('dark');
  document.getElementById('dark-btn').textContent = '☀️';
}

buildSidebar();
</script>
</body>
</html>
