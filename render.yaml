services:
  - type: web
    name: still-waters-scripture
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: APP_URL
        value: https://still-waters-scripture.onrender.com

  - type: cron
    name: still-waters-devotional
    runtime: python
    schedule: "0 12 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python tools/send_devotional.py
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: APP_URL
        value: https://still-waters-scripture.onrender.com

  - type: cron
    name: still-waters-reading
    runtime: python
    schedule: "0 2 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python tools/send_reading.py
    envVars:
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: APP_URL
        value: https://still-waters-scripture.onrender.com
